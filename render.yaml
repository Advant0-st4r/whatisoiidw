services:
  - type: web
    name: capmap-web
    env: node
    rootDir: .
    buildCommand: pnpm install --frozen-lockfile && pnpm rebuild better-sqlite3 && pnpm run build
    startCommand: node server.ts
    healthCheckPath: /health
    healthCheckIntervalSeconds: 5
    healthCheckTimeoutSeconds: 5
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
